<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 | 铁腕 - 智能任务管理</title>
    
    <!-- 样式文件 -->
    <link rel="stylesheet" href="/src/css/base.css">
    <link rel="stylesheet" href="/src/css/layout.css">
    <link rel="stylesheet" href="/src/css/components.css">
    <link rel="stylesheet" href="/src/css/responsive.css">
    
    <!-- 管理后台专用样式 -->
    <style>
        /* ============================================
           铁腕管理后台 - 专用样式
           ============================================ */
        
        /* 页面容器 */
        .admin-page {
            min-height: 100vh;
            background: var(--color-bg-page);
        }
        
        /* 顶部导航栏 */
        .admin-header {
            background: #fff;
            border-bottom: 1.5px solid #000;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .admin-header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        /* 返回按钮 */
        .btn-back {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: transparent;
            border: 1.5px solid #e5e7eb;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s;
            color: var(--color-text-secondary);
        }
        
        .btn-back:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
            background: var(--color-primary-bg);
        }
        
        .btn-back svg {
            width: 20px;
            height: 20px;
        }
        
        .admin-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        
        .admin-logo svg {
            width: 40px;
            height: 40px;
        }
        
        .admin-logo-text {
            font-size: 24px;
            font-weight: 700;
            color: var(--color-text-primary);
        }
        
        .admin-title {
            font-size: 14px;
            color: var(--color-text-secondary);
            padding-left: 16px;
            border-left: 1px solid #e5e7eb;
        }
        
        .admin-header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .admin-user {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--color-text-secondary);
        }
        
        .admin-user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--color-primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
        }
        
        .btn-logout {
            padding: 8px 16px;
            background: transparent;
            border: 1.5px solid #e5e7eb;
            border-radius: var(--radius-md);
            font-size: 13px;
            color: var(--color-text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-logout:hover {
            border-color: var(--color-urgent-important);
            color: var(--color-urgent-important);
        }
        
        /* 主内容区 */
        .admin-main {
            padding: 32px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* 页面标题 */
        .admin-page-header {
            margin-bottom: 32px;
        }
        
        .admin-page-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--color-text-primary);
            margin-bottom: 8px;
        }
        
        .admin-page-desc {
            font-size: 14px;
            color: var(--color-text-secondary);
        }
        
        /* 生成邀请码卡片 */
        .admin-card {
            background: #fff;
            border: 1.5px solid #000;
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 24px;
        }
        
        .admin-card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .admin-card-icon {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-md);
            background: var(--color-primary-bg);
            color: var(--color-primary);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .admin-card-icon svg {
            width: 24px;
            height: 24px;
        }
        
        .admin-card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--color-text-primary);
        }
        
        .admin-card-subtitle {
            font-size: 13px;
            color: var(--color-text-muted);
        }
        
        /* 表单样式 */
        .admin-form {
            display: flex;
            gap: 16px;
            align-items: flex-end;
        }
        
        .admin-form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .admin-form-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--color-text-primary);
        }
        
        .admin-form-input {
            padding: 12px 16px;
            border: 1.5px solid #e5e7eb;
            border-radius: var(--radius-md);
            font-size: 14px;
            color: var(--color-text-primary);
            background: #fff;
            transition: all 0.2s;
            outline: none;
            width: 200px;
        }
        
        .admin-form-input:hover {
            border-color: #d1d5db;
        }
        
        .admin-form-input:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.1);
        }
        
        .btn-generate {
            padding: 12px 24px;
            background: var(--color-primary);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-generate:hover {
            background: #3b82f6;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        
        .btn-generate:disabled {
            background: #e5e7eb;
            color: #9ca3af;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        /* 生成的邀请码展示 */
        .generated-code {
            margin-top: 20px;
            padding: 20px;
            background: var(--color-primary-bg);
            border: 1.5px dashed var(--color-primary);
            border-radius: var(--radius-md);
            display: none;
        }
        
        .generated-code.show {
            display: block;
        }
        
        .generated-code-label {
            font-size: 13px;
            color: var(--color-text-secondary);
            margin-bottom: 8px;
        }
        
        .generated-code-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--color-primary);
            font-family: 'Courier New', monospace;
            letter-spacing: 4px;
        }
        
        .generated-code-hint {
            font-size: 12px;
            color: var(--color-text-muted);
            margin-top: 8px;
        }
        
        /* 邀请码列表 */
        .code-list {
            overflow-x: auto;
        }
        
        .code-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .code-table th,
        .code-table td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .code-table th {
            font-size: 13px;
            font-weight: 600;
            color: var(--color-text-secondary);
            background: #f9fafb;
        }
        
        .code-table td {
            font-size: 14px;
            color: var(--color-text-primary);
        }
        
        .code-table tr:hover td {
            background: #f9fafb;
        }
        
        .code-value {
            font-family: 'Courier New', monospace;
            font-weight: 600;
            font-size: 16px;
            color: var(--color-primary);
            letter-spacing: 2px;
        }
        
        .code-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 600;
        }
        
        .code-status.active {
            background: var(--color-not-urgent-important-bg);
            color: var(--color-not-urgent-important);
        }
        
        .code-status.used {
            background: var(--color-not-urgent-not-important-bg);
            color: var(--color-not-urgent-not-important);
        }
        
        .code-status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }
        
        .code-status.active .code-status-dot {
            background: var(--color-not-urgent-important);
        }
        
        .code-status.used .code-status-dot {
            background: var(--color-not-urgent-not-important);
        }
        
        .usage-bar {
            width: 100px;
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .usage-bar-fill {
            height: 100%;
            background: var(--color-primary);
            border-radius: 4px;
            transition: width 0.3s;
        }
        
        .usage-text {
            font-size: 12px;
            color: var(--color-text-muted);
            margin-top: 4px;
        }
        
        .code-date {
            font-size: 13px;
            color: var(--color-text-secondary);
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        
        .empty-state-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            background: #f3f4f6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-text-muted);
        }
        
        .empty-state-icon svg {
            width: 32px;
            height: 32px;
        }
        
        .empty-state-text {
            font-size: 14px;
            color: var(--color-text-secondary);
        }
        
        /* 加载状态 */
        .loading-state {
            text-align: center;
            padding: 40px;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e5e7eb;
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 错误提示 */
        .error-alert {
            padding: 12px 16px;
            background: var(--color-urgent-important-bg);
            border: 1.5px solid var(--color-urgent-important);
            border-radius: var(--radius-md);
            color: var(--color-urgent-important);
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }
        
        .error-alert.show {
            display: block;
        }
        
        /* 响应式适配 */
        @media (max-width: 768px) {
            .admin-header {
                padding: 12px 16px;
            }
            
            .admin-title {
                display: none;
            }
            
            .admin-main {
                padding: 20px 16px;
            }
            
            .admin-form {
                flex-direction: column;
                align-items: stretch;
            }
            
            .admin-form-input {
                width: 100%;
            }
            
            .btn-generate {
                justify-content: center;
            }
            
            .code-table {
                font-size: 12px;
            }
            
            .code-table th,
            .code-table td {
                padding: 12px 8px;
            }
            
            .code-table th:nth-child(3),
            .code-table td:nth-child(3),
            .code-table th:nth-child(5),
            .code-table td:nth-child(5) {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="admin-page">
        <!-- 顶部导航栏 -->
        <header class="admin-header">
            <div class="admin-header-left">
                <button class="btn-back" id="backBtn" title="返回应用">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 12H5"/>
                        <path d="M12 19l-7-7 7-7"/>
                    </svg>
                </button>
                <a href="app.html" class="admin-logo">
                    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M25 20 L75 20 L80 35 L75 50 L50 55 L25 50 L20 35 Z" fill="#383838"/>
                        <rect x="30" y="30" width="40" height="25" fill="#f97316"/>
                        <circle cx="40" cy="42" r="4" fill="#fff"/>
                        <circle cx="60" cy="42" r="4" fill="#fff"/>
                        <path d="M45 55 L50 65 L55 55" fill="#facc15"/>
                        <rect x="35" y="60" width="8" height="15" fill="#383838"/>
                        <rect x="57" y="60" width="8" height="15" fill="#383838"/>
                    </svg>
                    <span class="admin-logo-text">铁腕</span>
                </a>
                <span class="admin-title">管理后台</span>
            </div>
            <div class="admin-header-right">
                <div class="admin-user">
                    <div class="admin-user-avatar" id="adminUserAvatar">A</div>
                    <span id="adminUserName">管理员</span>
                </div>
                <button class="btn-logout" id="logoutBtn">退出登录</button>
            </div>
        </header>
        
        <!-- 主内容区 -->
        <main class="admin-main">
            <div class="admin-page-header">
                <h1 class="admin-page-title">邀请码管理</h1>
                <p class="admin-page-desc">生成和管理用户注册邀请码</p>
            </div>
            
            <!-- 错误提示 -->
            <div class="error-alert" id="errorAlert"></div>
            
            <!-- 生成邀请码卡片 -->
            <div class="admin-card">
                <div class="admin-card-header">
                    <div class="admin-card-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
                        </svg>
                    </div>
                    <div>
                        <div class="admin-card-title">生成新邀请码</div>
                        <div class="admin-card-subtitle">创建新的6位邀请码供用户注册使用</div>
                    </div>
                </div>
                
                <form class="admin-form" id="generateForm">
                    <div class="admin-form-group">
                        <label class="admin-form-label">最大使用次数</label>
                        <input 
                            type="number" 
                            class="admin-form-input" 
                            id="maxUsesInput"
                            value="1"
                            min="1"
                            max="100"
                            required
                        >
                    </div>
                    <button type="submit" class="btn-generate" id="generateBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                        生成邀请码
                    </button>
                </form>
                
                <!-- 生成的邀请码展示 -->
                <div class="generated-code" id="generatedCode">
                    <div class="generated-code-label">生成的邀请码</div>
                    <div class="generated-code-value" id="generatedCodeValue"></div>
                    <div class="generated-code-hint">请复制此邀请码并提供给用户使用</div>
                </div>
            </div>
            
            <!-- 邀请码列表卡片 -->
            <div class="admin-card">
                <div class="admin-card-header">
                    <div class="admin-card-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <line x1="16" y1="13" x2="8" y2="13"/>
                            <line x1="16" y1="17" x2="8" y2="17"/>
                            <polyline points="10 9 9 9 8 9"/>
                        </svg>
                    </div>
                    <div>
                        <div class="admin-card-title">邀请码列表</div>
                        <div class="admin-card-subtitle">查看所有邀请码的使用情况</div>
                    </div>
                </div>
                
                <div class="code-list" id="codeListContainer">
                    <!-- 加载状态 -->
                    <div class="loading-state" id="loadingState">
                        <div class="loading-spinner"></div>
                        <div>加载中...</div>
                    </div>
                    
                    <!-- 空状态 -->
                    <div class="empty-state" id="emptyState" style="display: none;">
                        <div class="empty-state-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
                            </svg>
                        </div>
                        <div class="empty-state-text">暂无邀请码，请先生成一个</div>
                    </div>
                    
                    <!-- 表格 -->
                    <table class="code-table" id="codeTable" style="display: none;">
                        <thead>
                            <tr>
                                <th>邀请码</th>
                                <th>状态</th>
                                <th>使用进度</th>
                                <th>剩余次数</th>
                                <th>创建时间</th>
                            </tr>
                        </thead>
                        <tbody id="codeTableBody">
                            <!-- 动态生成 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="/src/js/admin.js"></script>
</body>
</html>
